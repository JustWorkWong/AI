name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.201"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./web/wms-web/package-lock.json"

      - name: Restore
        run: dotnet restore WmsAiPlatform.sln

      - name: Build
        run: dotnet build WmsAiPlatform.sln --no-restore

      - name: Test
        run: dotnet test WmsAiPlatform.sln --no-build

      - name: Install frontend deps
        working-directory: ./web/wms-web
        run: npm ci

      - name: Build frontend
        working-directory: ./web/wms-web
        run: npm run build
